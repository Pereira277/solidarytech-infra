apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ngo-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Pereira277/solidarytech-infra'
    targetRevision: main
    path: gitops/ngo-service
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: solidarytech
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
