apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: '2.10.2'
    helm:
      # helm.values passes real YAML booleans — helm.parameters passes strings.
      # The chart template datasources.yaml guards ConfigMap creation with:
      #   {{- if .Values.grafana.sidecar.datasources.enabled }}
      # Passing 'false' as a parameter string evaluated to truthy in Go templates;
      # passing false as a YAML boolean here evaluates to false and skips the block.
      # Our own ConfigMap (gitops/monitoring/loki-datasource.yaml) takes over
      # datasource registration with isDefault: false.
      values: |
        promtail:
          enabled: true
        grafana:
          enabled: false
          sidecar:
            datasources:
              enabled: false
        loki:
          isDefault: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
