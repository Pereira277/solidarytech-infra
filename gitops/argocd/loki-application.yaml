apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: '2.10.2'
    helm:
      parameters:
        - name: promtail.enabled
          value: 'true'
        - name: grafana.enabled
          value: 'false'
        # Prevent loki-stack from creating a datasource ConfigMap that the
        # kube-prometheus-stack Grafana sidecar would pick up as isDefault:true,
        # which conflicts with the Prometheus datasource already set as default.
        # Add Loki datasource manually via Grafana UI (http://loki:3100).
        - name: grafana.sidecar.datasources.enabled
          value: 'false'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
