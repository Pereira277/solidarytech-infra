apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: '2.10.2'
    helm:
      # Use values block (not parameters) so booleans reach the Go template as
      # real booleans. helm.parameters passes strings — the string "false" is
      # truthy in Go templates, which is why grafana.sidecar.datasources.enabled
      # as a parameter did not prevent the datasource ConfigMap from being created.
      #
      # loki.isDefault defaults to true in loki-stack values.yaml.
      # The chart template grafana-datasource.yaml renders:
      #   isDefault: {{ .Values.loki.isDefault }}
      # Setting it to false here patches the ConfigMap directly.
      # The ConfigMap (loki-loki-stack with label grafana_datasource=1) still
      # exists so Grafana registers Loki as a datasource — it just won't be default.
      values: |
        promtail:
          enabled: true
        grafana:
          enabled: false
        loki:
          isDefault: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
