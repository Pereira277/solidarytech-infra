apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: '2.10.2'
    helm:
      # The chart's datasources.yaml template (line 12-16):
      #   {{- if .Values.grafana.sidecar.datasources.label }}
      #   {{ label }}: {{ labelValue }}
      #   {{- else }}
      #   grafana_datasource: "1"
      #   {{- end }}
      #
      # Setting a custom label key causes the chart ConfigMap (loki-loki-stack) to use
      # loki_ds_disabled: "1" instead of grafana_datasource: "1". The kube-prometheus-stack
      # Grafana sidecar scans for grafana_datasource: "1" and therefore never discovers this
      # ConfigMap. Our own ConfigMap (gitops/monitoring/loki-datasource.yaml) retains
      # grafana_datasource: "1" and registers Loki with isDefault: false.
      values: |
        promtail:
          enabled: true
        grafana:
          enabled: false
          sidecar:
            datasources:
              label: "loki_ds_disabled"
              labelValue: "1"
        loki:
          isDefault: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
