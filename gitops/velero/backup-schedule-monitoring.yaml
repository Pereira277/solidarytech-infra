# Lower-frequency backup for the observability stack — less critical than the solidarytech namespace.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: monitoring-6h
  namespace: velero
spec:
  schedule: "0 */6 * * *"
  template:
    includedNamespaces:
      - monitoring
    storageLocation: default
    ttl: 48h0m0s
