apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sre-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 100,
              "min": 90,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 99},
                  {"color": "green", "value": 99.5}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "(count(kube_pod_status_ready{namespace=\"solidarytech\",condition=\"true\"}) / count(kube_pod_info{namespace=\"solidarytech\"})) * 100",
              "instant": true,
              "legendFormat": "Disponibilidade",
              "refId": "A"
            }
          ],
          "title": "Disponibilidade — Pods Ready (namespace solidarytech)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Disponibilidade atual menos o SLA de 99,5%. Positivo = dentro do budget. Negativo = SLA violado.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 1,
              "min": -1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0},
                  {"color": "green", "value": 0.3}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "((count(kube_pod_status_ready{namespace=\"solidarytech\",condition=\"true\"}) / count(kube_pod_info{namespace=\"solidarytech\"})) * 100) - 99.5",
              "instant": true,
              "legendFormat": "Margem vs SLA",
              "refId": "A"
            }
          ],
          "title": "Error Budget Proxy — Margem vs SLA 99,5% (pp)",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Total de restarts de containers no namespace solidarytech nas últimas 24h. Valores altos indicam instabilidade.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"index": 0, "text": "0 ✓"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"solidarytech\"}[24h]))",
              "instant": true,
              "legendFormat": "Restarts",
              "refId": "A"
            }
          ],
          "title": "Pod Restarts (24h) — namespace solidarytech",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "CPU consumida pelo donation-service em millicores. Request: 100m, Limit: 500m.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 100},
                  {"color": "red", "value": 400}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\",pod=~\"donation-service.*\"}[5m])) * 1000",
              "instant": true,
              "legendFormat": "CPU (m)",
              "refId": "A"
            }
          ],
          "title": "CPU Usage — donation-service (millicores)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "CPU do donation-service ao longo do tempo. Linha amarela = request (100m), linha vermelha = limit (500m).",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "millicores",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "line+area"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "transparent", "value": null},
                  {"color": "yellow", "value": 100},
                  {"color": "red", "value": 400}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 12, "x": 0, "y": 8},
          "id": 5,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\",pod=~\"donation-service.*\"}[5m])) * 1000",
              "legendFormat": "CPU atual (m)",
              "refId": "A"
            }
          ],
          "title": "CPU — donation-service (millicores) | amarelo=request 100m | vermelho=limit 500m",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Memória do donation-service ao longo do tempo. Linha amarela = request (128Mi), linha vermelha = limit (256Mi).",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "bytes",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "line+area"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "transparent", "value": null},
                  {"color": "yellow", "value": 134217728},
                  {"color": "red", "value": 240000000}
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 12, "x": 12, "y": 8},
          "id": 6,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\",pod=~\"donation-service.*\"})",
              "legendFormat": "Memória atual",
              "refId": "A"
            }
          ],
          "title": "Memória — donation-service | amarelo=request 128Mi | vermelho=limit 256Mi",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Réplicas disponíveis por deployment no namespace solidarytech. Queda indica pod não-Ready.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "pods disponíveis",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 18},
          "id": 7,
          "options": {
            "legend": {"calcs": ["min", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\"}",
              "legendFormat": "{{deployment}}",
              "refId": "A"
            }
          ],
          "title": "Pods Disponíveis por Deployment — namespace solidarytech",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["sre", "solidarytech", "donation-service"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "SolidaryTech — SRE Dashboard (donation-service)",
      "uid": "solidarytech-sre-v1",
      "version": 2
    }
