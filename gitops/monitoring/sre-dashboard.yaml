apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sre-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 100,
              "min": 95,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 99},
                  {"color": "green", "value": 99.5}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "(1 - sum(rate(http_requests_total{job=~\".*donation.*\",status=~\"5..\"}[30d])) / sum(rate(http_requests_total{job=~\".*donation.*\"}[30d]))) * 100",
              "instant": true,
              "legendFormat": "Disponibilidade",
              "refId": "A"
            }
          ],
          "title": "Disponibilidade (30d) — SLA: 99,5%",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 25},
                  {"color": "green", "value": 50}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "(0.001 - clamp_min(sum(rate(http_requests_total{job=~\".*donation.*\",status=~\"5..\"}[30d])) / sum(rate(http_requests_total{job=~\".*donation.*\"}[30d])), 0)) / 0.001 * 100",
              "instant": true,
              "legendFormat": "Error Budget",
              "refId": "A"
            }
          ],
          "title": "Error Budget Restante (30d)",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 300},
                  {"color": "red", "value": 500}
                ]
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\".*donation.*\"}[5m])) by (le)) * 1000",
              "instant": true,
              "legendFormat": "P99",
              "refId": "A"
            }
          ],
          "title": "Latência P99 (5min) — SLO: < 500ms",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.05},
                  {"color": "red", "value": 0.1}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_requests_total{job=~\".*donation.*\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=~\".*donation.*\"}[5m])) * 100",
              "instant": true,
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "Taxa de Erros 5xx (5min) — SLO: < 0,1%",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Latência (ms)",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "line"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "transparent", "value": null},
                  {"color": "red", "value": 500}
                ]
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 12, "x": 0, "y": 8},
          "id": 5,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\".*donation.*\"}[5m])) by (le)) * 1000",
              "legendFormat": "P99",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\".*donation.*\"}[5m])) by (le)) * 1000",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=~\".*donation.*\"}[5m])) by (le)) * 1000",
              "legendFormat": "P50 (mediana)",
              "refId": "C"
            }
          ],
          "title": "Latência POST /donations — P50 / P95 / P99 (linha vermelha = SLO 500ms)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Taxa de Erros (%)",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "line"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "transparent", "value": null},
                  {"color": "red", "value": 0.1}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 12, "x": 12, "y": 8},
          "id": 6,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_requests_total{job=~\".*donation.*\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=~\".*donation.*\"}[5m])) * 100",
              "legendFormat": "Taxa de Erros 5xx (%)",
              "refId": "A"
            }
          ],
          "title": "Taxa de Erros 5xx — donation-service (linha vermelha = SLO 0,1%)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "req/s",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 18},
          "id": 7,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_requests_total{job=~\".*donation.*\"}[5m]))",
              "legendFormat": "Total (req/s)",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_requests_total{job=~\".*donation.*\",status=~\"2..\"}[5m]))",
              "legendFormat": "2xx — sucesso",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(http_requests_total{job=~\".*donation.*\",status=~\"5..\"}[5m]))",
              "legendFormat": "5xx — erro",
              "refId": "C"
            }
          ],
          "title": "Throughput — donation-service (req/s)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["sre", "solidarytech", "donation-service"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "SolidaryTech — SRE Dashboard (donation-service)",
      "uid": "solidarytech-sre-v1",
      "version": 1
    }
